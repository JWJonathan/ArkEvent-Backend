services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=arkevent
      - POSTGRES_USER=arkevent_user
      - POSTGRES_PASSWORD=arkevent_pass
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: .
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgres://arkevent_user:arkevent_pass@db:5432/arkevent
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=arkevent_backend.settings
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
    depends_on:
      - db
      - redis

  celery:
    build: .
    command: celery -A arkevent_backend worker -l info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgres://arkevent_user:arkevent_pass@db:5432/arkevent
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./staticfiles:/app/staticfiles
    depends_on:
      - backend

volumes:
  postgres_data:
